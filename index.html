<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHSCC Season Dashboard — 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    button { font-family: inherit; }

    /* Responsive grids */
    .grid-season   { grid-template-columns: 1fr 2fr 2fr; }
    .grid-compare  { grid-template-columns: 3fr 2fr; }
    .grid-two-col  { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }

    @media (max-width: 720px) {
      .grid-season, .grid-compare { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script src="data.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, createContext, useContext } = React;


// ─── DATA ────────────────────────────────────────────────────────────────────
// All event data lives in data.js. Edit that file to update the dashboard.

const {
  SEASON, EVENTS,
  E1_PAX_TOP, E2_PAX_TOP,
  STANDINGS,
  MOVERS_UP, MOVERS_DOWN,
  CAT_DATA_E1, CAT_DATA_E2,
  NOVICE, NARRATIVE,
} = window.NHSCC_DATA;

// ─── THEMES ─────────────────────────────────────────────────────────────────

const FONT_URL = "https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap";

const darkTheme = {
  mode:"dark", bg:"#0a0e17", card:"#111827", cardBorder:"#1e293b",
  accent:"#f59e0b", accentDim:"#b45309",
  accentBg:"rgba(245,158,11,0.12)", accentBgSoft:"rgba(245,158,11,0.06)",
  green:"#34d399", greenBg:"rgba(52,211,153,0.08)", greenBorder:"rgba(52,211,153,0.12)", greenBgSoft:"rgba(52,211,153,0.06)",
  red:"#f87171", blue:"#60a5fa", blueBg:"rgba(96,165,250,0.06)",
  purple:"#a78bfa", purpleBg:"rgba(167,139,250,0.08)",
  text:"#f1f5f9", textDim:"#94a3b8", textMuted:"#475569",
  stripe:"rgba(255,255,255,0.02)", subtleBg:"rgba(255,255,255,0.02)", subtleBg2:"rgba(255,255,255,0.04)",
  tabActiveBg:"rgba(245,158,11,0.12)", gridStroke:"rgba(255,255,255,0.04)",
  tooltipBg:"#111827", logoText:"#000", logoShadow:"0 4px 20px rgba(245,158,11,0.3)",
  headingGradient:"linear-gradient(135deg,#f1f5f9,#94a3b8)",
};

const lightTheme = {
  mode:"light", bg:"#f4f4f0", card:"#ffffff", cardBorder:"#ddd9d0",
  accent:"#c2760a", accentDim:"#92400e",
  accentBg:"rgba(194,118,10,0.1)", accentBgSoft:"rgba(194,118,10,0.05)",
  green:"#0d7a50", greenBg:"rgba(13,122,80,0.08)", greenBorder:"rgba(13,122,80,0.15)", greenBgSoft:"rgba(13,122,80,0.05)",
  red:"#c62828", blue:"#1e5fc2", blueBg:"rgba(30,95,194,0.06)",
  purple:"#6a30c7", purpleBg:"rgba(106,48,199,0.06)",
  text:"#1c1917", textDim:"#57534e", textMuted:"#a8a29e",
  stripe:"rgba(0,0,0,0.025)", subtleBg:"rgba(0,0,0,0.02)", subtleBg2:"rgba(0,0,0,0.04)",
  tabActiveBg:"rgba(194,118,10,0.08)", gridStroke:"rgba(0,0,0,0.07)",
  tooltipBg:"#ffffff", logoText:"#fff", logoShadow:"0 4px 16px rgba(194,118,10,0.2)",
  headingGradient:"linear-gradient(135deg,#1c1917,#57534e)",
};

const ThemeCtx = createContext(darkTheme);
const useT = () => useContext(ThemeCtx);

// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function Card({ children, style }) {
  const t = useT();
  return (
    <div style={{ background:t.card, border:`1px solid ${t.cardBorder}`, borderRadius:12,
      padding:"20px 24px", position:"relative", overflow:"hidden",
      transition:"background 0.25s, border-color 0.25s, box-shadow 0.25s",
      boxShadow: t.mode==="light" ? "0 1px 3px rgba(0,0,0,0.06)" : "none",
      ...style }}>{children}</div>
  );
}

function SectionTitle({ children, sub }) {
  const t = useT();
  return (
    <div style={{marginBottom:20}}>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,
        textTransform:"uppercase",letterSpacing:"0.08em",color:t.text,margin:0}}>{children}</h2>
      {sub && <p style={{fontFamily:"'Barlow',sans-serif",fontSize:13,color:t.textDim,margin:"4px 0 0",fontWeight:400}}>{sub}</p>}
    </div>
  );
}

function StatBox({ label, value, accent=false }) {
  const t = useT();
  return (
    <div style={{textAlign:"center",flex:1,minWidth:0}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,
        fontSize:"clamp(20px,2vw,32px)",color:accent?t.accent:t.text,lineHeight:1}}>{value}</div>
      <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textDim,
        textTransform:"uppercase",letterSpacing:"0.1em",marginTop:6,fontWeight:500}}>{label}</div>
    </div>
  );
}

function Pill({ children, color }) {
  const t = useT();
  const c = color || t.accent;
  return (
    <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,
      fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,letterSpacing:"0.06em",
      background:`${c}22`,color:c,textTransform:"uppercase"}}>{children}</span>
  );
}

function TabBar({ tabs, active, onChange }) {
  const t = useT();
  return (
    <div style={{display:"flex",gap:4,marginBottom:20,borderBottom:`1px solid ${t.cardBorder}`,paddingBottom:0}}>
      {tabs.map(tb => (
        <button key={tb.id} onClick={()=>onChange(tb.id)} style={{
          fontFamily:"'Barlow Condensed',sans-serif",fontWeight:active===tb.id?700:500,fontSize:14,
          textTransform:"uppercase",letterSpacing:"0.08em",padding:"8px 16px",
          border:"none",cursor:"pointer",borderRadius:"8px 8px 0 0",transition:"all 0.15s",
          background:active===tb.id?t.tabActiveBg:"transparent",
          color:active===tb.id?t.accent:t.textDim,
          borderBottom:active===tb.id?`2px solid ${t.accent}`:"2px solid transparent",
        }}>{tb.label}</button>
      ))}
    </div>
  );
}

function ThemeToggle({ isDark, onToggle }) {
  const t = useT();
  return (
    <button onClick={onToggle} aria-label="Toggle theme" style={{
      position:"absolute",top:0,right:0,
      display:"flex",alignItems:"center",gap:8,
      padding:"8px 14px",borderRadius:8,border:`1px solid ${t.cardBorder}`,
      background:t.card,cursor:"pointer",transition:"all 0.2s",
      fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:12,
      textTransform:"uppercase",letterSpacing:"0.08em",color:t.textDim,
    }}>
      <span style={{fontSize:15,lineHeight:1}}>{isDark ? "☀️" : "🌙"}</span>
      {isDark ? "Light" : "Dark"}
    </button>
  );
}

// ─── PANELS ──────────────────────────────────────────────────────────────────

function SeasonOverview() {
  const t = useT();
  const first = EVENTS[0].drivers, last = EVENTS[EVENTS.length-1].drivers;
  const growth = ((last-first)/first*100).toFixed(0);
  return (
    <div className="grid-season" style={{display:"grid",gap:16}}>
      <Card>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg,${t.accent},${t.accentDim})`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:t.logoText,fontWeight:800}}>{EVENTS.length}</div>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,color:t.text}}>Events Complete</div>
            <div style={{fontFamily:"'Barlow',sans-serif",fontSize:12,color:t.textDim}}>{SEASON.seriesName}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <StatBox label="Unique Drivers" value={SEASON.totals.uniqueDrivers} />
          <StatBox label="Total Runs" value={SEASON.totals.totalRuns.toLocaleString()} />
          <StatBox label="Growth" value={`+${growth}%`} accent />
        </div>
      </Card>
      {EVENTS.map(ev => (
        <Card key={ev.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:17,color:t.text}}>{ev.name}</div>
              <div style={{fontFamily:"'Barlow',sans-serif",fontSize:12,color:t.textDim}}>{ev.subtitle} &middot; {ev.date}</div>
            </div>
            <Pill>{ev.ftdTime}s</Pill>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"nowrap"}}>
            <StatBox label="Drivers" value={ev.drivers} />
            <StatBox label="Runs" value={ev.runs} />
            <StatBox label="Clean %" value={`${ev.cleanRate}%`} />
            <StatBox label="Pylons" value={ev.pylons} />
            <StatBox label="Off Course" value={ev.oc} />
          </div>
          <div style={{marginTop:12,padding:"8px 12px",background:t.accentBgSoft,borderRadius:8,
            fontFamily:"'Barlow',sans-serif",fontSize:12,color:t.accent}}>
            FTD: {ev.ftdDriver} — {ev.ftdTime}s
          </div>
        </Card>
      ))}
    </div>
  );
}

function PointsStandings() {
  const t = useT();
  const [showAll, setShowAll] = useState(false);
  const data = showAll ? STANDINGS : STANDINGS.slice(0,12);
  return (
    <Card>
      <SectionTitle sub={`Class winners after ${EVENTS.length} events — ${STANDINGS.filter(d=>d.total===EVENTS.length*10).length} drivers with perfect ${EVENTS.length*10}pts`}>Points Standings</SectionTitle>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Barlow',sans-serif",fontSize:13}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${t.cardBorder}`}}>
              {["#","Driver","Class","Pts 1","Pts 2","Total"].map(h => (
                <th key={h} style={{padding:"8px 10px",textAlign:h==="#"?"center":"left",
                  fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:11,
                  textTransform:"uppercase",letterSpacing:"0.1em",color:t.textMuted}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.map((d,i) => (
              <tr key={d.name} style={{borderBottom:`1px solid ${t.cardBorder}`,background:i%2===0?"transparent":t.stripe}}>
                <td style={{padding:"10px",textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",
                  fontWeight:700,color:i<12?t.accent:t.textDim,fontSize:15}}>{i+1}</td>
                <td style={{padding:"10px",color:t.text,fontWeight:500}}>{d.name}</td>
                <td style={{padding:"10px"}}><Pill color={t.blue}>{d.cls}</Pill></td>
                <td style={{padding:"10px",color:d.p1===10?t.green:t.textDim,fontWeight:600,
                  fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{d.p1||"—"}</td>
                <td style={{padding:"10px",color:d.p2===10?t.green:t.textDim,fontWeight:600,
                  fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{d.p2||"—"}</td>
                <td style={{padding:"10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,
                  fontSize:18,color:d.total===20?t.accent:t.text}}>{d.total}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <button onClick={()=>setShowAll(!showAll)} style={{marginTop:12,border:"none",
        background:t.accentBg,color:t.accent,padding:"8px 16px",borderRadius:6,
        cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:13,
        textTransform:"uppercase",letterSpacing:"0.06em"}}>
        {showAll?"Show Less":"Show All 20"}
      </button>
    </Card>
  );
}

function PaxLeaderboard() {
  const t = useT();
  const [event, setEvent] = useState(1);
  const list = event===1 ? E1_PAX_TOP : E2_PAX_TOP;
  const best = list[0].pax;
  return (
    <Card>
      <SectionTitle sub="Indexed times level the playing field across all classes">PAX Leaderboard</SectionTitle>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[1,2].map(e => (
          <button key={e} onClick={()=>setEvent(e)} style={{
            padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",
            fontFamily:"'Barlow Condensed',sans-serif",fontWeight:event===e?700:500,fontSize:13,
            background:event===e?t.accentBg:t.subtleBg2,
            color:event===e?t.accent:t.textDim,textTransform:"uppercase",letterSpacing:"0.06em",
          }}>Pts {e}</button>
        ))}
      </div>
      {list.map((d,i) => {
        const gap = d.pax - best;
        return (
          <div key={d.name} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",
            borderBottom:i<list.length-1?`1px solid ${t.cardBorder}`:"none"}}>
            <div style={{width:28,textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",
              fontWeight:800,fontSize:16,color:i<3?t.accent:t.textMuted}}>{i+1}</div>
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:13,color:t.text,fontWeight:500}}>{d.name}</div>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textMuted,marginTop:1}}>{d.car}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                {i===0 ? (
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,
                    color:t.accent,textTransform:"uppercase",letterSpacing:"0.06em"}}>Leader</span>
                ) : (
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:13,
                    color:t.textDim}}>+{gap.toFixed(3)}s</span>
                )}
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,
                  color:i<3?t.text:t.textDim,minWidth:62,textAlign:"right"}}>{d.pax.toFixed(3)}s</span>
                <Pill color={i<3?t.blue:t.textMuted}>{d.cls}</Pill>
              </div>
            </div>
          </div>
        );
      })}
    </Card>
  );
}

function MoversShakers() {
  const t = useT();
  return (
    <Card>
      <SectionTitle sub="PAX percentile rank changes between events for returning drivers">Movers &amp; Shakers</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,
            textTransform:"uppercase",letterSpacing:"0.1em",color:t.green,marginBottom:10,
            display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:16}}>&#9650;</span> Rising
          </div>
          {MOVERS_UP.map(m => (
            <div key={m.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 0",borderBottom:`1px solid ${t.cardBorder}`}}>
              <div>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:13,color:t.text,fontWeight:500}}>{m.name}</div>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textMuted}}>{m.r1} → {m.r2}</div>
              </div>
              <Pill color={t.green}>{m.pct}</Pill>
            </div>
          ))}
        </div>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,
            textTransform:"uppercase",letterSpacing:"0.1em",color:t.red,marginBottom:10,
            display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:16}}>&#9660;</span> Sliding
          </div>
          {MOVERS_DOWN.map(m => (
            <div key={m.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 0",borderBottom:`1px solid ${t.cardBorder}`}}>
              <div>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:13,color:t.text,fontWeight:500}}>{m.name}</div>
                <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textMuted}}>{m.r1} → {m.r2}</div>
              </div>
              <Pill color={t.red}>{m.pct}</Pill>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

function CategoryBreakdown() {
  const t = useT();
  const [hover, setHover] = useState(null); // { i, series: "e1"|"e2" } | null
  const allCats = [...new Set([...Object.keys(CAT_DATA_E1), ...Object.keys(CAT_DATA_E2)])].sort();
  const chartData = allCats.map(c => ({
    name: c.replace("Classic American Muscle","CAM").replace("Street Touring Bump","ST Bump")
           .replace("Street Modified","SM").replace("Electric Vehicle","EV")
           .replace("Xtreme Street","XS").replace("Unlimited Bump","UB")
           .replace("Street Prepared","SP").replace("Hoosier Bump","HB")
           .replace("Street Touring","ST").replace("Street Bump","SB"),
    e1: CAT_DATA_E1[c]||0, e2: CAT_DATA_E2[c]||0, full: c,
  }));
  const maxVal = Math.max(...chartData.map(d => Math.max(d.e1, d.e2)));
  const e1Total = chartData.reduce((s,d)=>s+d.e1,0);
  const e2Total = chartData.reduce((s,d)=>s+d.e2,0);
  const activeLabel = EVENTS[0].subtitle, activeLabel2 = EVENTS[1]?.subtitle || "Pts 2";
  const hoveredCat = hover ? chartData[hover.i] : null;

  const barStyle = (series, i, h) => {
    const isHovered = hover && hover.i === i && hover.series === series;
    const anyHover = hover !== null;
    const dim = anyHover && !isHovered;
    const base = series === "e1" ? t.blue : t.accent;
    return {
      width:"42%", height:h, background:base,
      borderRadius:"3px 3px 0 0",
      opacity: series === "e1" ? (dim ? 0.25 : (isHovered ? 1 : 0.7)) : (dim ? 0.35 : 1),
      transform: isHovered ? "scaleY(1.03)" : "scaleY(1)",
      transformOrigin: "bottom",
      transition: "opacity 0.15s, transform 0.15s, height 0.3s",
      cursor: "pointer",
    };
  };

  const BAR_AREA = 280; // px — bar columns; label area below is separate

  return (
    <Card>
      <SectionTitle sub="Driver distribution by category across events">Category Breakdown</SectionTitle>
      <div style={{position:"relative"}}>
        <div style={{display:"flex",gap:4,alignItems:"flex-end",height:BAR_AREA + 36,padding:"0 4px"}}
          onMouseLeave={()=>setHover(null)}>
          {chartData.map((d,i) => {
            const h1 = (d.e1/maxVal) * BAR_AREA;
            const h2 = (d.e2/maxVal) * BAR_AREA;
            const catHovered = hover && hover.i === i;
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:0}}>
                <div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",justifyContent:"center",height:BAR_AREA}}>
                  <div style={barStyle("e1", i, h1)}
                    onMouseEnter={()=>setHover({i, series:"e1"})} />
                  <div style={barStyle("e2", i, h2)}
                    onMouseEnter={()=>setHover({i, series:"e2"})} />
                </div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,
                  color:catHovered ? t.text : t.textMuted,
                  fontWeight:catHovered ? 700 : 400,
                  textAlign:"center",lineHeight:1.1,width:"100%",overflow:"hidden",textOverflow:"ellipsis",
                  whiteSpace:"nowrap",transform:"rotate(-40deg)",transformOrigin:"center",marginTop:4,height:30,
                  transition:"color 0.15s, font-weight 0.15s"}}>{d.name}</div>
              </div>
            );
          })}
        </div>
        {hoveredCat && (
          <div style={{
            position:"absolute", top:-6, left:"50%", transform:"translateX(-50%)",
            background:t.tooltipBg, border:`1px solid ${t.cardBorder}`, borderRadius:8,
            padding:"10px 14px", boxShadow:t.mode==="light" ? "0 4px 12px rgba(0,0,0,0.08)" : "0 4px 16px rgba(0,0,0,0.4)",
            fontFamily:"'Barlow',sans-serif", fontSize:12, color:t.text,
            pointerEvents:"none", minWidth:200, zIndex:10,
          }}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,
              textTransform:"uppercase",letterSpacing:"0.06em",color:t.text,marginBottom:6}}>
              {hoveredCat.full}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16,padding:"3px 0",
              opacity: hover.series==="e1" ? 1 : 0.6}}>
              <span style={{display:"flex",alignItems:"center",gap:6,color:t.textDim}}>
                <span style={{width:8,height:8,borderRadius:2,background:t.blue,opacity:0.8,display:"inline-block"}} />
                {activeLabel}
              </span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:t.text}}>
                {hoveredCat.e1} <span style={{color:t.textMuted,fontWeight:400,fontSize:10}}>({e1Total ? ((hoveredCat.e1/e1Total)*100).toFixed(1) : 0}%)</span>
              </span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",gap:16,padding:"3px 0",
              opacity: hover.series==="e2" ? 1 : 0.6}}>
              <span style={{display:"flex",alignItems:"center",gap:6,color:t.textDim}}>
                <span style={{width:8,height:8,borderRadius:2,background:t.accent,display:"inline-block"}} />
                {activeLabel2}
              </span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,color:t.text}}>
                {hoveredCat.e2} <span style={{color:t.textMuted,fontWeight:400,fontSize:10}}>({e2Total ? ((hoveredCat.e2/e2Total)*100).toFixed(1) : 0}%)</span>
              </span>
            </div>
            <div style={{borderTop:`1px solid ${t.cardBorder}`,marginTop:6,paddingTop:6,
              display:"flex",justifyContent:"space-between",gap:16}}>
              <span style={{color:t.textDim}}>Change</span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                color: hoveredCat.e2 > hoveredCat.e1 ? t.green : hoveredCat.e2 < hoveredCat.e1 ? t.red : t.textDim}}>
                {hoveredCat.e2 - hoveredCat.e1 > 0 ? "+" : ""}{hoveredCat.e2 - hoveredCat.e1}
                {hoveredCat.e1 > 0 && (
                  <span style={{fontWeight:400,fontSize:11,marginLeft:4}}>
                    ({hoveredCat.e2 - hoveredCat.e1 > 0 ? "+" : ""}{(((hoveredCat.e2 - hoveredCat.e1)/hoveredCat.e1)*100).toFixed(0)}%)
                  </span>
                )}
              </span>
            </div>
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:16}}>
        <div style={{display:"flex",alignItems:"center",gap:6,fontFamily:"'Barlow',sans-serif",fontSize:12,color:t.textDim}}>
          <div style={{width:12,height:12,borderRadius:2,background:t.blue,opacity:0.7}} /> Points 1
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontFamily:"'Barlow',sans-serif",fontSize:12,color:t.textDim}}>
          <div style={{width:12,height:12,borderRadius:2,background:t.accent}} /> Points 2
        </div>
      </div>
    </Card>
  );
}

function EventComparison() {
  const t = useT();
  const [hover, setHover] = useState(null);
  const e1 = EVENTS[0], e2 = EVENTS[1] || EVENTS[0];
  const metrics = [
    { label:"Drivers",      e1:e1.drivers,   e2:e2.drivers },
    { label:"Total Runs",   e1:e1.runs,      e2:e2.runs },
    { label:"Clean Rate %", e1:e1.cleanRate, e2:e2.cleanRate },
    { label:"Pylons Hit",   e1:e1.pylons,    e2:e2.pylons },
    { label:"Off Course",   e1:e1.oc,        e2:e2.oc },
    { label:"DNFs",         e1:e1.dnf,       e2:e2.dnf },
  ];
  const lowerIsBetter = new Set(["DNFs","Off Course","Pylons Hit"]);
  const fmtDelta = (m) => {
    const d = m.e2 - m.e1;
    if (d === 0) return "±0";
    const sign = d > 0 ? "+" : "";
    const pct = m.e1 ? ` (${sign}${((d/m.e1)*100).toFixed(0)}%)` : "";
    return `${sign}${+d.toFixed(2)}${pct}`;
  };
  return (
    <Card>
      <SectionTitle sub="Side-by-side event metrics — hover a row for delta">Event Comparison</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr minmax(90px,auto) 1fr",gap:0,alignItems:"center"}}>
        <div style={{textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
          fontSize:13,color:t.blue,textTransform:"uppercase",letterSpacing:"0.08em",paddingBottom:10}}>{e1.subtitle}</div>
        <div />
        <div style={{textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
          fontSize:13,color:t.accent,textTransform:"uppercase",letterSpacing:"0.08em",paddingBottom:10}}>{e2.subtitle}</div>
        {metrics.map((m,i) => {
          const max = Math.max(m.e1,m.e2) || 1;
          const e1w = (m.e1/max)*100;
          const e2w = (m.e2/max)*100;
          const e2better = lowerIsBetter.has(m.label) ? m.e2<m.e1 : m.e2>m.e1;
          const isHover = hover === i;
          const rowBg = isHover ? t.subtleBg : "transparent";
          const onEnter = ()=>setHover(i);
          const onLeave = ()=>setHover(null);
          const delta = m.e2 - m.e1;
          const deltaColor = delta === 0 ? t.textDim : (e2better ? t.green : t.red);
          return [
            <div key={`e1-${i}`} onMouseEnter={onEnter} onMouseLeave={onLeave}
              style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",padding:"6px 8px",
                background:rowBg,borderRadius:"6px 0 0 6px",transition:"background 0.15s",cursor:"default"}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,
                color:!e2better?t.text:t.textMuted,minWidth:40,textAlign:"right"}}>{m.e1}</span>
              <div style={{flex:1,height:6,background:t.subtleBg2,borderRadius:3,overflow:"hidden",direction:"rtl"}}>
                <div style={{width:`${e1w}%`,height:"100%",background:t.blue,borderRadius:3,
                  transition:"width 0.3s"}} />
              </div>
            </div>,
            <div key={`label-${i}`} onMouseEnter={onEnter} onMouseLeave={onLeave}
              style={{textAlign:"center",padding:"6px 12px",fontFamily:"'Barlow',sans-serif",
                fontSize:11,color:isHover ? t.text : t.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",
                fontWeight:isHover ? 700 : 500,whiteSpace:"nowrap",background:rowBg,
                transition:"color 0.15s, font-weight 0.15s",position:"relative"}}>
              {isHover ? (
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,
                  color:deltaColor,letterSpacing:"0.04em"}}>{fmtDelta(m)}</span>
              ) : m.label}
            </div>,
            <div key={`e2-${i}`} onMouseEnter={onEnter} onMouseLeave={onLeave}
              style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:rowBg,
                borderRadius:"0 6px 6px 0",transition:"background 0.15s",cursor:"default"}}>
              <div style={{flex:1,height:6,background:t.subtleBg2,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${e2w}%`,height:"100%",background:t.accent,borderRadius:3,
                  transition:"width 0.3s"}} />
              </div>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,
                color:e2better?t.text:t.textMuted,minWidth:40}}>{m.e2}</span>
            </div>
          ];
        })}
      </div>
    </Card>
  );
}

function RetentionWidget() {

  const prev = EVENTS[EVENTS.length-2] || EVENTS[0];
  const curr = EVENTS[EVENTS.length-1];
  const pct = ((returning/(returning+oneEventOnly))*100).toFixed(0);
  return (
    <Card>
      <SectionTitle sub="Driver retention and new registrations between events">Participation Flow</SectionTitle>
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:24,flexWrap:"wrap",padding:"12px 0"}}>
        <div style={{textAlign:"center"}}>
          <div style={{width:90,height:90,borderRadius:"50%",border:`3px solid ${t.blue}`,
            display:"flex",alignItems:"center",justifyContent:"center",background:t.blueBg}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:28,color:t.blue}}>{prev.drivers}</div>
          </div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textDim,marginTop:6}}>{prev.subtitle}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:t.green}}>{returning}</span>
            <span style={{color:t.green,fontSize:18}}>→</span>
          </div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:10,color:t.textMuted}}>returned</div>
          <div style={{width:1,height:16,background:t.cardBorder}} />
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:10,color:t.textMuted}}>{oneEventOnly} one-event</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{width:100,height:100,borderRadius:"50%",border:`3px solid ${t.accent}`,
            display:"flex",alignItems:"center",justifyContent:"center",background:t.accentBgSoft}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:28,color:t.accent}}>{curr.drivers}</div>
          </div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:t.textDim,marginTop:6}}>{curr.subtitle}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:4}}>
        <div style={{padding:"8px 14px",background:t.greenBg,borderRadius:8,textAlign:"center"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:t.green}}>{pct}%</div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:10,color:t.textMuted}}>Retention Rate</div>
        </div>
        <div style={{padding:"8px 14px",background:t.accentBg,borderRadius:8,textAlign:"center"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:t.accent}}>{newInLatest}</div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:10,color:t.textMuted}}>New in {curr.subtitle}</div>
        </div>
        <div style={{padding:"8px 14px",background:t.purpleBg,borderRadius:8,textAlign:"center"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:t.purple}}>{uniqueDrivers}</div>
          <div style={{fontFamily:"'Barlow',sans-serif",fontSize:10,color:t.textMuted}}>Total Unique</div>
        </div>
      </div>
    </Card>
  );
}
